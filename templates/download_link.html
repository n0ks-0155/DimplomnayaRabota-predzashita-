<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Документ готов</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Документ успешно создан!</h1>
        {% if template_label %}
            <p><strong>Готовый шаблон:</strong> {{ template_label }}</p>
        {% endif %}
        <p>Документ готов к скачиванию:</p>
        <p>
            {% if pdf_filename %}
                <a href="{{ url_for('download_file', filename=pdf_filename) }}" class="btn">Скачать</a>
            {% elif filename %}
                <a href="{{ url_for('download_file', filename=filename) }}" class="btn">Скачать</a>
            {% endif %}
        </p>
        <p><a href="{{ url_for('index') }}">← Вернуться на главную</a></p>
    </div>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
